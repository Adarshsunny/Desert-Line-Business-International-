<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#F6F6F6"/>
  <!-- Crossed Electrodes (Background Layer) -->
  <g stroke="#002D62" stroke-width="8" stroke-linecap="round" fill="none">
    <line x1="35" y1="165" x2="165" y2="35"/>
    <line x1="165" y1="165" x2="35" y2="35"/>
  </g>
  <g stroke="#FF8C00" stroke-width="4" stroke-linecap="round" fill="none">
    <line x1="35" y1="165" x2="135" y2="65"/>
    <line x1="165" y1="165" x2="65" y2="65"/>
  </g>
  <!-- Welding Handshield Mask (Foreground) -->
  <g transform="translate(100, 100) scale(1.1) translate(-100, -100)">
    <!-- Mask Body Shield -->
    <path d="M 60 50 L 140 50 C 145 50 148 56 146 60 L 130 130 C 128 140 115 145 100 145 C 85 145 72 140 70 130 L 54 60 C 52 56 55 50 60 50 Z" fill="#002D62" stroke="#002D62" stroke-width="4" stroke-linejoin="round"/>
    <!-- Shield Accent Border -->
    <path d="M 70 60 L 130 60 L 118 120 C 112 130 88 130 82 120 Z" fill="none" stroke="#FF8C00" stroke-width="3"/>
    <!-- Viewing Lens Glass Frame -->
    <rect x="75" y="70" width="50" height="24" fill="#FFFFFF" stroke="#002D62" stroke-width="4" stroke-linejoin="round"/>
    <!-- Protective Greenish / Yellowish Glass -->
    <rect x="80" y="75" width="40" height="14" fill="#FFC700"/>
    <line x1="84" y1="75" x2="94" y2="89" stroke="#FF8C00" stroke-width="2"/>
    <line x1="96" y1="75" x2="106" y2="89" stroke="#FF8C00" stroke-width="2"/>
  </g>
  <!-- Sparks / Welding Flashes -->
  <path d="M 25 80 L 15 75 M 35 60 L 45 55" stroke="#FFC700" stroke-width="4" stroke-linecap="round"/>
  <path d="M 175 80 L 185 75 M 165 60 L 155 55" stroke="#FFC700" stroke-width="4" stroke-linecap="round"/>
  <polygon points="100,10 104,22 116,22 106,29 110,40 100,33 90,40 94,29 84,22 96,22" fill="#FF8C00" stroke="#002D62" stroke-width="2" transform="translate(60, 110) scale(0.6)"/>
  <polygon points="100,10 104,22 116,22 106,29 110,40 100,33 90,40 94,29 84,22 96,22" fill="#FFC700" stroke="#002D62" stroke-width="2" transform="translate(-60, 110) scale(0.5)"/>
</svg>
