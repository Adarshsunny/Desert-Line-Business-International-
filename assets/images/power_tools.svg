<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#F6F6F6"/>
  <!-- Cordless Drill Layout -->
  <g transform="translate(100, 100) rotate(-15) translate(-100, -100)">
    <!-- Battery Pack at the base of the handle -->
    <rect x="50" y="130" width="45" height="24" rx="4" fill="#002D62" stroke="#002D62" stroke-width="4"/>
    <rect x="53" y="140" width="39" height="10" rx="2" fill="#FFC700"/>
    
    <!-- Handle -->
    <path d="M 60 90 L 75 130 L 90 130 L 80 90 Z" fill="#002D62" stroke="#002D62" stroke-width="4" stroke-linejoin="round"/>
    <!-- Trigger Button -->
    <path d="M 80 98 C 84 98 84 106 80 106 L 76 102 Z" fill="#FF8C00" stroke="#002D62" stroke-width="2"/>
    
    <!-- Main Motor Housing/Body -->
    <path d="M 45 55 L 130 55 C 135 55 140 60 140 68 L 138 90 C 138 95 133 98 128 98 L 52 98 C 48 98 44 94 44 88 L 44 58 C 44 56 45 55 45 55 Z" fill="#002D62" stroke="#002D62" stroke-width="4" stroke-linejoin="round"/>
    <!-- Housing highlight plate -->
    <rect x="58" y="65" width="55" height="22" rx="3" fill="#FFC700" stroke="#002D62" stroke-width="2"/>
    <!-- Vent Slots -->
    <line x1="68" y1="70" x2="68" y2="82" stroke="#002D62" stroke-width="3" stroke-linecap="round"/>
    <line x1="76" y1="70" x2="76" y2="82" stroke="#002D62" stroke-width="3" stroke-linecap="round"/>
    <line x1="84" y1="70" x2="84" y2="82" stroke="#002D62" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Torque Adjustment Collar Ring -->
    <rect x="138" y="60" width="16" height="34" rx="2" fill="#FF8C00" stroke="#002D62" stroke-width="3"/>
    
    <!-- Keyless Chuck -->
    <path d="M 154 65 L 170 68 L 170 86 L 154 89 Z" fill="#CCCCCC" stroke="#002D62" stroke-width="3"/>
    <!-- Drill Bit -->
    <polygon points="170,75 195,75 198,77 195,79 170,79" fill="#002D62"/>
    <!-- Thread markings on drill bit -->
    <line x1="176" y1="75" x2="182" y2="79" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="184" y1="75" x2="190" y2="79" stroke="#FFFFFF" stroke-width="1.5"/>
  </g>
</svg>
