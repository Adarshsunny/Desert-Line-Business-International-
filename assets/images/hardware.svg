<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#F6F6F6"/>
  <!-- Hex Bolt (Diagonal) -->
  <g transform="translate(100, 100) rotate(45)">
    <!-- Threads -->
    <rect x="-10" y="-70" width="20" height="90" fill="#CCCCCC" stroke="#002D62" stroke-width="5" stroke-linejoin="round"/>
    <!-- Thread lines -->
    <line x1="-10" y1="-60" x2="10" y2="-55" stroke="#002D62" stroke-width="4"/>
    <line x1="-10" y1="-45" x2="10" y2="-40" stroke="#002D62" stroke-width="4"/>
    <line x1="-10" y1="-30" x2="10" y2="-25" stroke="#002D62" stroke-width="4"/>
    <line x1="-10" y1="-15" x2="10" y2="-10" stroke="#002D62" stroke-width="4"/>
    <line x1="-10" y1="0" x2="10" y2="5" stroke="#002D62" stroke-width="4"/>
    <!-- Hexagonal Head -->
    <polygon points="-25,20 0,35 25,20 25,-10 0,-25 -25,-10" fill="#FFC700" stroke="#002D62" stroke-width="5" stroke-linejoin="round"/>
    <polygon points="-15,12 0,22 15,12 15,-5 0,-15 -15,-5" fill="none" stroke="#FF8C00" stroke-width="3"/>
  </g>
  <!-- Hex Nut (Flat) -->
  <g transform="translate(60, 130) rotate(-15)">
    <polygon points="35,0 17,30 -17,30 -35,0 -17,-30 17,-30" fill="#002D62" stroke="#002D62" stroke-width="2"/>
    <circle cx="0" cy="0" r="14" fill="#F6F6F6" stroke="#002D62" stroke-width="4"/>
    <path d="M -18 -8 L -18 8 L -8 18 L 8 18 L 18 8 L 18 -8 L 8 -18 L -8 -18 Z" fill="none" stroke="#FF8C00" stroke-width="2" stroke-dasharray="4 3"/>
  </g>
  <!-- Wood Screw -->
  <g transform="translate(140, 60) rotate(-30)">
    <!-- Pointy tip shaft -->
    <path d="M -5 -30 L 5 -30 L 5 20 L 0 35 L -5 20 Z" fill="#CCCCCC" stroke="#002D62" stroke-width="4"/>
    <!-- Thread coils -->
    <path d="M -5 -20 L 5 -15 M -5 -10 L 5 -5 M -5 0 L 5 5 M -5 10 L 5 15" stroke="#002D62" stroke-width="3" stroke-linecap="round"/>
    <!-- Screw head -->
    <path d="M -12 -30 L 12 -30 L 8 -40 L -8 -40 Z" fill="#FF8C00" stroke="#002D62" stroke-width="4" stroke-linejoin="round"/>
    <!-- Drive slot (Cross) -->
    <line x1="-5" y1="-35" x2="5" y2="-35" stroke="#002D62" stroke-width="3"/>
  </g>
</svg>
