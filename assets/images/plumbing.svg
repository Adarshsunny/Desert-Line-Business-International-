<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#F6F6F6"/>
  <!-- Pipe Network -->
  <g stroke="#002D62" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Horizontal Pipe -->
    <path d="M 20 100 L 180 100"/>
    <!-- Vertical T-Branch -->
    <path d="M 100 100 L 100 160"/>
  </g>
  <!-- Connectors / Flanges -->
  <rect x="15" y="88" width="10" height="24" rx="2" fill="#FF8C00" stroke="#002D62" stroke-width="3"/>
  <rect x="175" y="88" width="10" height="24" rx="2" fill="#FF8C00" stroke="#002D62" stroke-width="3"/>
  <rect x="88" y="155" width="24" height="10" rx="2" fill="#FF8C00" stroke="#002D62" stroke-width="3"/>
  <!-- T-Joint Central Coupling -->
  <circle cx="100" cy="100" r="16" fill="#002D62"/>
  <circle cx="100" cy="100" r="8" fill="#FFC700"/>
  <!-- Plumbing Valve Handle -->
  <path d="M 100 65 L 100 88" stroke="#FF8C00" stroke-width="8" stroke-linecap="round"/>
  <!-- Wheel Handle -->
  <circle cx="100" cy="55" r="20" fill="none" stroke="#002D62" stroke-width="6"/>
  <circle cx="100" cy="55" r="5" fill="#FF8C00"/>
  <line x1="80" y1="55" x2="120" y2="55" stroke="#002D62" stroke-width="4"/>
  <line x1="100" y1="35" x2="100" y2="75" stroke="#002D62" stroke-width="4"/>
  <!-- Water Drops -->
  <path d="M 50 125 C 50 130 46 134 42 134 C 38 134 34 130 34 125 C 34 118 42 110 42 110 C 42 110 50 118 50 125 Z" fill="#002D62" opacity="0.8"/>
  <path d="M 155 125 C 155 130 151 134 147 134 C 143 134 139 130 139 125 C 139 118 147 110 147 110 C 147 110 155 118 155 125 Z" fill="#FF8C00" opacity="0.8"/>
</svg>
