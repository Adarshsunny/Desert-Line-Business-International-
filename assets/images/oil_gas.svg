<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#F6F6F6"/>
  <!-- Industrial Pipeline Flange -->
  <g stroke="#002D62" stroke-width="12" stroke-linecap="round" fill="none">
    <path d="M 20 120 L 180 120"/>
  </g>
  <!-- Flange collars -->
  <rect x="55" y="100" width="16" height="40" rx="3" fill="#CCCCCC" stroke="#002D62" stroke-width="4"/>
  <rect x="129" y="100" width="16" height="40" rx="3" fill="#CCCCCC" stroke="#002D62" stroke-width="4"/>
  <line x1="63" y1="108" x2="63" y2="132" stroke="#FF8C00" stroke-width="4" stroke-linecap="round"/>
  <line x1="137" y1="108" x2="137" y2="132" stroke="#FF8C00" stroke-width="4" stroke-linecap="round"/>
  <!-- Central Valve Body -->
  <polygon points="70,95 130,95 120,145 80,145" fill="#002D62" stroke="#002D62" stroke-width="2"/>
  <circle cx="100" cy="120" r="16" fill="#FFC700" stroke="#002D62" stroke-width="3"/>
  <circle cx="100" cy="120" r="6" fill="#FF8C00"/>
  <!-- Stem -->
  <rect x="94" y="65" width="12" height="30" rx="2" fill="#FF8C00" stroke="#002D62" stroke-width="3"/>
  <!-- Heavy Duty Handwheel Handle -->
  <ellipse cx="100" cy="55" rx="35" ry="12" fill="none" stroke="#002D62" stroke-width="6"/>
  <ellipse cx="100" cy="55" rx="35" ry="12" fill="none" stroke="#FFC700" stroke-width="2"/>
  <!-- Spoke pins -->
  <line x1="68" y1="55" x2="132" y2="55" stroke="#002D62" stroke-width="4"/>
  <line x1="100" y1="46" x2="100" y2="64" stroke="#002D62" stroke-width="4"/>
  <!-- Flame / Drop indicator -->
  <path d="M 160 85 C 160 92 154 98 147 98 C 140 98 134 92 134 85 C 134 78 147 68 147 68 C 147 68 160 78 160 85 Z" fill="#FF8C00" opacity="0.9" stroke="#002D62" stroke-width="2"/>
</svg>
