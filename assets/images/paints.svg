<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#F6F6F6"/>
  <!-- Paint Roller Accessory (Background Position) -->
  <g transform="translate(130, 75) rotate(-35)">
    <!-- Metal Frame -->
    <path d="M 0 50 L -25 50 L -25 -15 L 0 -15" fill="none" stroke="#CCCCCC" stroke-width="8" stroke-linecap="round"/>
    <path d="M 0 50 L -25 50 L -25 -15 L 0 -15" fill="none" stroke="#002D62" stroke-width="3" stroke-linecap="round"/>
    <!-- Extension connection -->
    <line x1="-15" y1="50" x2="-15" y2="90" stroke="#CCCCCC" stroke-width="8" stroke-linecap="round"/>
    <line x1="-15" y1="50" x2="-15" y2="90" stroke="#002D62" stroke-width="3" stroke-linecap="round"/>
    <!-- Handle Gripper -->
    <rect x="-21" y="80" width="12" height="45" rx="3" fill="#FF8C00" stroke="#002D62" stroke-width="3"/>
    
    <!-- Paint Roller Cushion Sleeve -->
    <rect x="-10" y="-30" width="20" height="70" rx="6" fill="#FFC700" stroke="#002D62" stroke-width="4" transform="rotate(90 0 5)"/>
    <!-- Sleeve texture pattern -->
    <path d="M -25 -5 L -10 -5 M -25 15 L -10 15 M 10 -5 L 25 -5 M 10 15 L 25 15" stroke="#FF8C00" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Paint Bucket (Foreground) -->
  <g transform="translate(45, 75)">
    <!-- Bucket Handle (Wire) -->
    <path d="M 5 45 C 5 5 95 5 95 45" fill="none" stroke="#002D62" stroke-width="4" stroke-linecap="round"/>
    <!-- Bucket Body -->
    <path d="M 10 45 L 90 45 L 80 115 L 20 115 Z" fill="#FFFFFF" stroke="#002D62" stroke-width="6" stroke-linejoin="round"/>
    <!-- Colored Label -->
    <polygon points="17,55 83,55 77,95 23,95" fill="#002D62"/>
    <!-- Highlight Accent -->
    <rect x="35" y="65" width="30" height="15" fill="#FFC700"/>
    <!-- Paint dripping down bucket -->
    <path d="M 30 45 C 30 55 38 60 42 60 C 46 60 50 50 54 50 C 58 50 62 70 68 70 C 74 70 78 55 78 45" fill="none" stroke="#FF8C00" stroke-width="6" stroke-linecap="round"/>
    <!-- Rim lip -->
    <rect x="6" y="40" width="88" height="6" rx="2" fill="#FF8C00" stroke="#002D62" stroke-width="3"/>
  </g>
</svg>
