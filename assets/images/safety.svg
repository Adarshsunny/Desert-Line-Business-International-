<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#F6F6F6"/>
  <!-- Safety Goggles (Background Layer) -->
  <g transform="translate(100, 75) scale(1.1) translate(-100, -75)">
    <!-- Goggle Strap -->
    <path d="M 30 75 Q 100 95 170 75" fill="none" stroke="#002D62" stroke-width="8" stroke-linecap="round"/>
    <!-- Glass frame base -->
    <path d="M 50 65 L 150 65 C 158 65 162 72 158 78 L 140 102 C 135 110 120 110 115 102 L 105 92 L 95 92 L 85 102 C 80 110 65 110 60 102 L 42 78 C 38 72 42 65 50 65 Z" fill="#FFFFFF" stroke="#002D62" stroke-width="6" stroke-linejoin="round"/>
    <!-- Right Lens fill -->
    <path d="M 105 72 L 143 72 L 132 94 C 130 98 122 98 120 94 Z" fill="#FFC700" opacity="0.6" stroke="#002D62" stroke-width="2"/>
    <!-- Left Lens fill -->
    <path d="M 57 72 L 95 72 L 80 94 C 78 98 70 98 68 94 Z" fill="#FFC700" opacity="0.6" stroke="#002D62" stroke-width="2"/>
  </g>
  <!-- Industrial Hard Hat Helmet (Foreground Layer) -->
  <g transform="translate(100, 115)">
    <!-- Main Cap Dome -->
    <path d="M -60 15 C -60 -45 60 -45 60 15 Z" fill="#FF8C00" stroke="#002D62" stroke-width="6" stroke-linejoin="round"/>
    <!-- Crest Center Ridge -->
    <path d="M -15 -18 C -15 -35 15 -35 15 -18 L 15 15 L -15 15 Z" fill="#FFC700" stroke="#002D62" stroke-width="4"/>
    <!-- Helmet Brim / Visor Edge -->
    <path d="M -75 15 C -75 8 75 8 75 15 C 75 22 -75 22 -75 15 Z" fill="#002D62" stroke="#002D62" stroke-width="2"/>
    <!-- Reflective Safety Badge in center of helmet -->
    <polygon points="-8,3 8,3 5,12 -5,12" fill="#FFFFFF" stroke="#002D62" stroke-width="2"/>
  </g>
</svg>
