<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#F6F6F6"/>
  <!-- Wire/Cable loop -->
  <path d="M 30 150 C 30 180 170 180 170 140 C 170 100 130 80 100 80 C 70 80 30 100 30 130" fill="none" stroke="#CCCCCC" stroke-width="14" stroke-linecap="round"/>
  <path d="M 30 150 C 30 180 170 180 170 140 C 170 100 130 80 100 80 C 70 80 30 100 30 130" fill="none" stroke="#002D62" stroke-width="6" stroke-linecap="round"/>
  <!-- Electrical Wall Socket Faceplate -->
  <rect x="55" y="40" width="90" height="90" rx="8" fill="#FFFFFF" stroke="#002D62" stroke-width="6" stroke-linejoin="round"/>
  <!-- Switch Button in center -->
  <rect x="88" y="65" width="24" height="40" rx="2" fill="#F6F6F6" stroke="#002D62" stroke-width="3"/>
  <line x1="88" y1="85" x2="112" y2="85" stroke="#FF8C00" stroke-width="3"/>
  <circle cx="100" cy="75" r="3" fill="#FF8C00"/>
  <!-- Energy Bolt / Lightning Symbol -->
  <polygon points="105,15 75,65 95,65 85,115 125,50 100,50" fill="#FFC700" stroke="#002D62" stroke-width="3" stroke-linejoin="round"/>
  <!-- Exposed Wire End Tips -->
  <g transform="translate(30, 130) rotate(-45)">
    <rect x="-8" y="-12" width="16" height="12" fill="#002D62"/>
    <rect x="-6" y="-20" width="4" height="8" fill="#FF8C00"/>
    <rect x="2" y="-20" width="4" height="8" fill="#FFC700"/>
  </g>
</svg>
