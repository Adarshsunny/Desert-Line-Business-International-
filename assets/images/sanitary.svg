<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#F6F6F6"/>
  <!-- Modern Gooseneck Faucet -->
  <!-- Base Escutcheon -->
  <path d="M 50 160 L 150 160 C 150 152 140 148 130 148 L 70 148 C 60 148 50 152 50 160 Z" fill="#002D62" stroke="#002D62" stroke-width="2"/>
  <!-- Faucet Body -->
  <path d="M 85 148 L 85 80 C 85 50 115 25 140 45 C 152 55 148 70 135 70" stroke="#002D62" stroke-width="16" fill="none" stroke-linecap="round"/>
  <path d="M 85 148 L 85 80 C 85 50 115 25 140 45 C 152 55 148 70 135 70" stroke="#FFC700" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Tap Spout Aerator Tip -->
  <rect x="127" y="65" width="16" height="10" rx="2" fill="#FF8C00" stroke="#002D62" stroke-width="3" transform="rotate(15 135 70)"/>
  <!-- Single Mixer Lever Handle -->
  <g transform="translate(68, 100)">
    <!-- Lever stem -->
    <path d="M 12 12 L 0 -15" stroke="#002D62" stroke-width="8" stroke-linecap="round"/>
    <!-- Lever knob -->
    <circle cx="0" cy="-15" r="7" fill="#FF8C00" stroke="#002D62" stroke-width="2"/>
    <!-- Mixer dome -->
    <path d="M 0 20 C 0 10 24 10 24 20 Z" fill="#002D62"/>
  </g>
  <!-- Flowing Water Spray -->
  <path d="M 134 76 L 142 120" stroke="#FF8C00" stroke-width="4" stroke-dasharray="8 6" stroke-linecap="round" opacity="0.8"/>
  <path d="M 138 75 L 150 120" stroke="#002D62" stroke-width="3" stroke-dasharray="10 5" stroke-linecap="round" opacity="0.6"/>
  <!-- Soap Dispenser Accessory -->
  <g transform="translate(45, 120)">
    <rect x="-10" y="10" width="20" height="30" rx="4" fill="#002D62"/>
    <path d="M -5 10 L -5 0 C -5 -5 5 -5 5 0" fill="none" stroke="#FF8C00" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
